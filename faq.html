<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>循環露 · AI 客服諮詢</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold2: #E8C97A;
  --gold3: rgba(201,168,76,0.15);
  --ink: #1a1208;
  --bg: #0d0a05;
  --bg2: #13100a;
  --panel: #1a1510;
  --border: rgba(201,168,76,0.18);
  --muted: rgba(201,168,76,0.5);
  --white: #fdfaf4;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  background: rgba(13,10,5,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-back {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; color: var(--muted);
  font-size: 12px; letter-spacing: 0.1em;
  transition: color 0.2s;
}
.nav-back:hover { color: var(--gold); }
.nav-back svg { width: 16px; height: 16px; }
.nav-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; letter-spacing: 0.3em;
  color: var(--muted); text-transform: uppercase;
}

/* MAIN */
main {
  flex: 1; display: flex; flex-direction: column;
  max-width: 760px; width: 100%; margin: 0 auto;
  padding: 100px 24px 120px;
}

/* HEADER */
.chat-header {
  text-align: center; margin-bottom: 40px;
}
.chat-header-badge {
  display: inline-flex; align-items: center; gap: 8px;
  border: 1px solid var(--border); border-radius: 20px;
  padding: 5px 16px; margin-bottom: 20px;
  font-size: 10px; letter-spacing: 0.25em; color: var(--muted);
  text-transform: uppercase;
}
.badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
.chat-header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 600; color: var(--white);
  margin-bottom: 10px; letter-spacing: 0.05em;
}
.chat-header p {
  font-size: 13px; color: var(--muted); line-height: 1.8;
}

/* QUICK QUESTIONS */
.quick-wrap {
  margin-bottom: 28px;
}
.quick-label {
  font-size: 10px; letter-spacing: 0.2em;
  color: var(--muted); margin-bottom: 12px;
  text-transform: uppercase;
}
.quick-pills {
  display: flex; flex-wrap: wrap; gap: 8px;
}
.quick-pill {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 14px;
  font-size: 12px; color: rgba(253,250,244,0.7);
  cursor: pointer; transition: all 0.2s;
  font-family: 'Noto Sans TC', sans-serif;
}
.quick-pill:hover {
  border-color: var(--gold); color: var(--gold);
  background: var(--gold3);
}

/* CHAT AREA */
.chat-area {
  flex: 1; display: flex; flex-direction: column; gap: 20px;
  margin-bottom: 24px; min-height: 200px;
}

.msg {
  display: flex; gap: 12px; align-items: flex-start;
  animation: msgIn 0.3s ease;
}
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center;
  justify-content: center; font-size: 14px;
  border: 1px solid var(--border);
}
.msg.ai .msg-avatar {
  background: linear-gradient(135deg, #2a1f08, #3d2e10);
  color: var(--gold);
}
.msg.user .msg-avatar {
  background: rgba(201,168,76,0.1);
  color: var(--gold2); font-size: 12px;
}

.msg-bubble {
  max-width: 80%; padding: 14px 18px;
  border-radius: 16px; font-size: 13px;
  line-height: 1.8; letter-spacing: 0.02em;
}
.msg.ai .msg-bubble {
  background: var(--panel);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: rgba(253,250,244,0.9);
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, #3d2e10, #2a1f08);
  border: 1px solid rgba(201,168,76,0.3);
  border-top-right-radius: 4px;
  color: var(--white);
}

/* TYPING */
.typing-dots {
  display: flex; gap: 4px; padding: 4px 0;
}
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--muted); animation: dot 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

/* INPUT */
.input-wrap {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(13,10,5,0.92);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: 16px 24px 20px;
}
.input-inner {
  max-width: 760px; margin: 0 auto;
  display: flex; gap: 10px; align-items: flex-end;
}
.input-box {
  flex: 1; background: var(--panel);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 16px; color: var(--white);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; line-height: 1.6;
  resize: none; outline: none; min-height: 46px; max-height: 120px;
  transition: border-color 0.2s;
}
.input-box::placeholder { color: var(--muted); }
.input-box:focus { border-color: rgba(201,168,76,0.4); }
.send-btn {
  width: 46px; height: 46px; border-radius: 12px;
  background: linear-gradient(135deg, #9a7520, var(--gold));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.3); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.send-btn svg { width: 18px; height: 18px; color: var(--ink); }

/* FOOTER */
.chat-footer {
  text-align: center; font-size: 10px;
  color: rgba(201,168,76,0.3); letter-spacing: 0.1em;
  margin-top: 8px;
}

/* DIVIDER */
.chat-divider {
  text-align: center; font-size: 10px;
  color: rgba(201,168,76,0.25); letter-spacing: 0.15em;
  margin: 4px 0; text-transform: uppercase;
}

@media (max-width: 600px) {
  nav { padding: 14px 16px; }
  main { padding: 90px 16px 110px; }
  .msg-bubble { max-width: 90%; font-size: 12px; }
  .input-wrap { padding: 12px 16px 16px; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    返回官網
  </a>
  <div class="nav-title">循環露 · AI 客服</div>
  <div style="width:60px"></div>
</nav>

<main>
  <div class="chat-header">
    <div class="chat-header-badge">
      <div class="badge-dot"></div>
      AI 客服線上中
    </div>
    <h1>循環露保養顧問</h1>
    <p>您好！我是循環露的 AI 保養顧問<br>歡迎詢問產品、訂購、配送等任何問題</p>
  </div>

  <div class="quick-wrap">
    <div class="quick-label">✦ 常見問題快速入口</div>
    <div class="quick-pills">
      <button class="quick-pill" onclick="sendQuick('循環露是什麼？')">循環露是什麼？</button>
      <button class="quick-pill" onclick="sendQuick('G1–G8 有什麼不同？')">G1–G8 有什麼不同？</button>
      <button class="quick-pill" onclick="sendQuick('如何選擇適合我的系列？')">如何選擇適合我的系列？</button>
      <button class="quick-pill" onclick="sendQuick('怎麼使用循環露？')">怎麼使用循環露？</button>
      <button class="quick-pill" onclick="sendQuick('配送方式與運費？')">配送方式與運費？</button>
      <button class="quick-pill" onclick="sendQuick('退換貨政策？')">退換貨政策？</button>
      <button class="quick-pill" onclick="sendQuick('可以混搭不同系列嗎？')">可以混搭不同系列嗎？</button>
      <button class="quick-pill" onclick="sendQuick('首購優惠怎麼使用？')">首購優惠怎麼使用？</button>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <!-- 歡迎訊息 -->
    <div class="msg ai">
      <div class="msg-avatar">✦</div>
      <div class="msg-bubble">
        您好！我是循環露的 AI 保養顧問 🌿<br><br>
        我可以回答您關於產品成分、系列選擇、使用方式、訂購流程、配送退換等所有問題。<br><br>
        請直接輸入您的問題，或點選上方常見問題快速查詢！
      </div>
    </div>
  </div>

  <div class="chat-footer">
    天語生物科技股份有限公司 · PRO◆Pharm · 循環露 CIRCULATION ESSENCE
  </div>
</main>

<div class="input-wrap">
  <div class="input-inner">
    <textarea class="input-box" id="inputBox" placeholder="請輸入您的問題…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `你是「循環露 AI 保養顧問」，代表台灣品牌 PRO◆Pharm 的護膚產品線「循環露 CIRCULATION ESSENCE」提供客戶服務。

【品牌背景】
天語生物科技股份有限公司旗下品牌 PRO◆Pharm，循環露是其核心產品線。

【產品概述】
循環露是一套「32天循環保養系統」，共8個系列（G1–G8），每個系列4支精華，每天使用1支，32天完成一個完整循環。

【8大系列】
- G1 細胞外囊泡（旗艦級 NT$2,580）：煥活長齡、深萃飽潤、賦活光燦、恆潤保鮮
- G2 幹細胞能量（旗艦級 NT$2,580）：能量煥活、藻萃活顏、水潤豐盈、深養蓄能
- G3 胜肽緊緻保養（主力級 NT$1,980）：彈潤緊顏、豐盈飽澤、即效水潤、舒芯柔緻
- G4 PDRN 美白（主力級 NT$1,980）：無暇淨白、光透亮白、益色煥白、晶瑩柔白
- G5 微生態調理（主力級 NT$1,680）：電亮賦活、電亮賦嫩、電亮賦平、電亮賦潤
- G6 黑豆舒緩保養（入門級 NT$1,480）：舒緩1、舒緩2、舒緩3、舒緩4
- G7 深層保濕（入門級 NT$1,280）：保水保濕、鎖水保濕、固水保濕、護水保濕
- G8 二裂酵母保養（入門級 NT$1,280）：新色透亮、新色煥顏、新色柔潤、新色光感

【等級與定價】
- 旗艦級（G1、G2）：NT$2,580 / 32支全套
- 主力級（G3、G4、G5）：NT$1,980–1,680 / 32支全套
- 入門級（G6、G7、G8）：NT$1,280–1,480 / 32支全套
- 客製化32支組合首購價：NT$1,680

【配送】
- 超商取貨（7-11/全家）：NT$60
- 宅配（黑貓/新竹）：NT$100
- 滿 NT$2,500 免運

【退換貨】
- 一般商品：未拆封7天鑑賞期，拆封後不退
- 客製化組合：一經訂購確認不接受退換貨（消保法第19條但書）
- 瑕疵品：本公司負擔退貨運費，請當日拍照存證

【聯絡方式】
LINE 官方帳號：@659prhya

【回答原則】
1. 用繁體中文回答，語氣親切專業
2. 回答簡潔，重點突出，適當使用條列
3. 涉及醫療效果的問題請說明僅供參考
4. 不確定的資訊請建議客人直接聯絡 LINE 客服
5. 回答長度適中，不要過長`;

let messages = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function sendQuick(text) {
  document.getElementById('inputBox').value = text;
  sendMsg();
}

function addMsg(role, text) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'ai' ? '✦' : '您'}</div>
    <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function addTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingMsg';
  div.innerHTML = `
    <div class="msg-avatar">✦</div>
    <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

async function sendMsg() {
  if (isLoading) return;
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', text);
  messages.push({ role: 'user', content: text });

  addTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || '抱歉，我暫時無法回答，請聯絡 LINE 客服 @659prhya';
    messages.push({ role: 'assistant', content: reply });
    addMsg('ai', reply);

  } catch (err) {
    removeTyping();
    addMsg('ai', '抱歉，網路連線異常，請稍後再試或聯絡 LINE 客服 @659prhya 😊');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('inputBox').focus();
}
</script>

</body>
</html>
